apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql
  namespace: vprofile

spec:

  serviceName: mysql

  replicas: 1

  selector:
    matchLabels:
      app: mysql


  template:

    metadata:
      labels:
        app: mysql


    spec:

      containers:

      - name: mysql

        image:
          esraaghazal/vprofile-db:1.0


        ports:
        - containerPort: 3306


        env:

        - name: MYSQL_ROOT_PASSWORD

          valueFrom:
            secretKeyRef:

              name: mysql-secret

              key: MYSQL_ROOT_PASSWORD


        volumeMounts:

        - name: mysql-data

          mountPath: /var/lib/mysql



  volumeClaimTemplates:

  - metadata:

      name: mysql-data

    spec:

      accessModes:
      - ReadWriteOnce

      resources:

        requests:

          storage: 5Gi