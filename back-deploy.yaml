apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: vprofile
  labels:
    app: backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z db01 3306; do echo waiting for db01; sleep 3; done;",
            ]
        - name: wait-for-mc
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mc01 11211; do echo waiting for mc01; sleep 3; done;",
            ]
        - name: wait-for-rmq
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z rmq01 5672; do echo waiting for rmq01; sleep 3; done;",
            ]
      containers:
        - name: backend
          image: esraaghazal/vprofile-back:1.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: vprofile
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080