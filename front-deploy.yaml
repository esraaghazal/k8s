apiVersion: apps/v1

kind: Deployment


metadata:

 name: frontend

 namespace: vprofile



spec:

 replicas: 2


 selector:

  matchLabels:

   app: frontend



 template:


  metadata:

   labels:

    app: frontend



  spec:


   containers:


   - name: frontend


     image: esraaghazal/vprofile-front:1.2


     ports:

     - containerPort: 80


     volumeMounts:

     - name: nginx

       mountPath: /etc/nginx/conf.d/default.conf

       subPath: default.conf



   volumes:


   - name: nginx


     configMap:


      name: nginx-config